<dialog
  #dlg
  class="bell-dropdown"
  aria-label="Уведомления"
  (click)="onBackdropClick($event)"
  (close)="onDialogClose()"
>
  <div
    class="bell-panel"
    (click)="$event.stopPropagation()"
  >
    <header class="bell-head">
      <span class="bell-title">Уведомления</span>
      <button
        class="bell-markall"
        type="button"
        (click)="onMarkAllRead()"
      >
        Отметить прочитанными
      </button>
    </header>

    @switch (viewState()) {
      @case ('loading') {
        <div class="bell-skeletons">
          <div class="bell-skel"></div>
          <div class="bell-skel"></div>
          <div class="bell-skel"></div>
        </div>
      }
      @case ('error') {
        <div class="bell-empty">
          <p class="bell-empty-title">Не удалось загрузить</p>
          <button
            class="bell-retry"
            type="button"
            (click)="onRetry()"
          >
            Повторить
          </button>
        </div>
      }
      @case ('empty') {
        <div class="bell-empty">
          <mat-icon class="bell-empty-ico">notifications_none</mat-icon>
          <p class="bell-empty-title">Пока нет уведомлений</p>
        </div>
      }
      @default {
        <ul class="bell-rows">
          @for (it of previewItems(); track it.id) {
            <li class="bell-row-wrap">
              <mrsqm-notification-row
                [item]="it"
                [filterName]="filterNameFor(it)"
                (activated)="onRow(it)"
              />
            </li>
          }
        </ul>
      }
    }

    <footer class="bell-foot">
      <button
        class="bell-viewall"
        type="button"
        (click)="onViewAll()"
      >
        Все уведомления
      </button>
    </footer>
  </div>
</dialog>
