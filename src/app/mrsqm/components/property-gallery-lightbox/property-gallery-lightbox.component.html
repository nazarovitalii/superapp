<div
  class="lightbox"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  <!-- Верхняя панель: счётчик + крестик -->
  <div class="lb-topbar">
    <span class="lb-counter">{{ index() + 1 }} / {{ photos().length }}</span>
    <button
      class="lb-close"
      mat-icon-button
      (click)="close()"
      [attr.aria-label]="'Закрыть'"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Фон-подложка: клик мимо фото закрывает -->
  <button
    type="button"
    class="lb-backdrop"
    (click)="close()"
    [attr.aria-label]="'Закрыть просмотр'"
  ></button>

  <!-- Стрелка влево -->
  @if (photos().length > 1) {
    <button
      class="lb-nav lb-nav--prev"
      mat-icon-button
      (click)="prev()"
      [attr.aria-label]="'Предыдущее фото'"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>
  }

  <!-- Текущее фото -->
  @if (current(); as photo) {
    <img
      class="lb-image"
      [src]="photo.full_url"
      [alt]="'Фото ' + (index() + 1)"
    />
  }

  <!-- Стрелка вправо -->
  @if (photos().length > 1) {
    <button
      class="lb-nav lb-nav--next"
      mat-icon-button
      (click)="next()"
      [attr.aria-label]="'Следующее фото'"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
  }

  <!-- Полоска миниатюр -->
  @if (photos().length > 1) {
    <div class="lb-thumbs">
      @for (p of photos(); track p.full_url; let i = $index) {
        <button
          type="button"
          class="lb-thumb"
          [class.is-active]="i === index()"
          (click)="go(i)"
          [attr.aria-label]="'Фото ' + (i + 1)"
        >
          <img
            [src]="p.thumb_url"
            [alt]="'Миниатюра ' + (i + 1)"
          />
        </button>
      }
    </div>
  }
</div>
